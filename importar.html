  try {
    log('Leyendo tu base actual…');

    const d = snap.exists ? (snap.data()||{}) : {};
    const antes = Array.isArray(d.data) ? d.data.length : 0;
    log('Clientes que se van a borrar: ' + antes, 'warn');

    const nuevos = LISTA.map(c => ({
      id: nuevoId(),
      nombre: c.nombre,
      telefono: '',
      direccion: c.direccion,
      plan: '10 M',
      monto: 350,
      diaPago: c.diaPago,
      corteDias: 0,
      notas: '',
      historialPagos: {},
